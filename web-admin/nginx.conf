server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for content-hashed assets (Vite appends ?v=... or [hash] to filenames)
    location ~* \.(js|css|woff2|woff|ttf|ico|svg|png|jpg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ALB health check — must return 200 quickly
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
        access_log off;
    }

    # Prevent serving hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
    }
}
