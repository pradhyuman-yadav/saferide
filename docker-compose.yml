services:

  auth:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "4001:4001"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  tenant:
    build:
      context: .
      dockerfile: tenant-service/Dockerfile
