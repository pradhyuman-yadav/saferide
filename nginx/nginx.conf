# SafeRide — Nginx Reverse Proxy
# Deployed on EC2 (ap-south-1). SSL managed by Certbot / Let's Encrypt.
#
# Run once after launch to get certs:
#   sudo certbot --nginx -d api.saferide.co.in -d ws.saferide.co.in
#
# Certbot will insert the ssl_certificate / ssl_certificate_key lines
# and set up the automatic HTTP → HTTPS redirect.

# ── Shared proxy settings ─────────────────────────────────────────────────────
# (Included in every location block via the map below)

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.saferide.co.in ws.saferide.co.in;

    # Let Certbot handle ACME challenges for cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── API gateway ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.saferide.co.in;
    http2 on;

    # SSL — Certbot fills these in after first run
    # ssl_certificate     /etc/letsencrypt/live/api.saferide.co.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.saferide.co.in/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (web-admin sets its own via Firebase Hosting)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # Common proxy headers
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;

    # ── auth-service (4001) ──────────────────────────────────────────────────
    # Handles: /health  /api/v1/auth/*  /api/v1/status
    location ~* ^/(health|api/v1/auth|api/v1/status) {
        proxy_pass http://127.0.0.1:4001;
    }

    # ── tenant-service (4002) ────────────────────────────────────────────────
    location ~* ^/api/v1/tenants {
        proxy_pass http://127.0.0.1:4002;
    }

    # ── route-service (4003) ─────────────────────────────────────────────────
    # Handles: /api/v1/buses  /api/v1/routes  /api/v1/stops
    #          /api/v1/drivers  /api/v1/students
    location ~* ^/api/v1/(buses|routes|stops|drivers|students) {
        proxy_pass http://127.0.0.1:4003;
    }

    # ── trip-service (4004) ──────────────────────────────────────────────────
    # Handles: /api/v1/trips  /api/v1/telemetry  /api/v1/webhooks
    location ~* ^/api/v1/(trips|telemetry|webhooks) {
        proxy_pass http://127.0.0.1:4004;
    }
}

# ── WebSocket gateway ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name ws.saferide.co.in;
    http2 on;

    # ssl_certificate     /etc/letsencrypt/live/api.saferide.co.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.saferide.co.in/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        proxy_pass         http://127.0.0.1:4005;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;    # Hold WebSocket connections open for 1 hour
        proxy_send_timeout 3600s;
    }
}
