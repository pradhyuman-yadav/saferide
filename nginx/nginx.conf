# SafeRide — Nginx config
# SSL is added automatically by Certbot. Run once after DNS is live:
#
# sudo certbot --nginx \
#   -d saferide.co.in -d www.saferide.co.in \
#   -d trysaferide.com -d www.trysaferide.com \
#   -d api.saferide.co.in -d ws.saferide.co.in
#
# After Certbot runs it will insert ssl_certificate lines and add a
# redirect server block. You will not need to edit this file manually.

# ── trysaferide.com → saferide.co.in ─────────────────────────────────────────
server {
    listen 80;
    server_name trysaferide.com www.trysaferide.com;
    return 301 https://saferide.co.in$request_uri;
}

# ── Web admin — static files (saferide.co.in) ────────────────────────────────
server {
    listen 80;
    server_name saferide.co.in www.saferide.co.in;

    add_header X-Content-Type-Options  "nosniff"                            always;
    add_header X-Frame-Options         "DENY"                               always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"    always;

    root /opt/saferide/web-admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Web admin — dev (dev.saferide.co.in) ─────────────────────────────────────
server {
    listen 80;
    server_name dev.saferide.co.in;

    add_header X-Content-Type-Options  "nosniff"  always;
    add_header X-Frame-Options         "DENY"     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    root /opt/saferide/web-admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── API gateway — prod (api.saferide.co.in) ───────────────────────────────────
server {
    listen 80;
    server_name api.saferide.co.in;

    add_header X-Content-Type-Options  "nosniff"  always;
    add_header X-Frame-Options         "DENY"     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;

    location ~* ^/(health|api/v1/auth|api/v1/status) { proxy_pass http://127.0.0.1:4001; }
    location ~* ^/api/v1/tenants                      { proxy_pass http://127.0.0.1:4002; }
    location ~* ^/api/v1/(buses|routes|stops|drivers|students) { proxy_pass http://127.0.0.1:4003; }
    location ~* ^/api/v1/(trips|telemetry|webhooks)   { proxy_pass http://127.0.0.1:4004; }
}

# ── API gateway — dev (api-dev.saferide.co.in) ────────────────────────────────
server {
    listen 80;
    server_name api-dev.saferide.co.in;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;

    location ~* ^/(health|api/v1/auth|api/v1/status) { proxy_pass http://127.0.0.1:4001; }
    location ~* ^/api/v1/tenants                      { proxy_pass http://127.0.0.1:4002; }
    location ~* ^/api/v1/(buses|routes|stops|drivers|students) { proxy_pass http://127.0.0.1:4003; }
    location ~* ^/api/v1/(trips|telemetry|webhooks)   { proxy_pass http://127.0.0.1:4004; }
}

# ── WebSocket gateway — prod (ws.saferide.co.in) ─────────────────────────────
server {
    listen 80;
    server_name ws.saferide.co.in;

    location / {
        proxy_pass         http://127.0.0.1:4005;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# ── WebSocket gateway — dev (ws-dev.saferide.co.in) ──────────────────────────
server {
    listen 80;
    server_name ws-dev.saferide.co.in;

    location / {
        proxy_pass         http://127.0.0.1:4005;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
