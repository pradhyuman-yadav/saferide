# SafeRide — Nginx Reverse Proxy + Static File Server
# Deployed on EC2 (ap-south-1). SSL managed by Certbot / Let's Encrypt.
#
# Run once after launch to get certs (prod):
#   sudo certbot --nginx \
#     -d saferide.co.in -d www.saferide.co.in \
#     -d trysaferide.com -d www.trysaferide.com \
#     -d api.saferide.co.in -d ws.saferide.co.in
#
# Run once after launch to get certs (dev):
#   sudo certbot --nginx \
#     -d dev.saferide.co.in \
#     -d api-dev.saferide.co.in -d ws-dev.saferide.co.in

# ── HTTP → HTTPS redirect (all domains) ───────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── trysaferide.com → saferide.co.in redirect ────────────────────────────────
server {
    listen 443 ssl;
    server_name trysaferide.com www.trysaferide.com;

    # ssl_certificate     /etc/letsencrypt/live/trysaferide.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/trysaferide.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://saferide.co.in$request_uri;
}

# ── Web admin — static files (saferide.co.in) ────────────────────────────────
server {
    listen 443 ssl;
    server_name saferide.co.in www.saferide.co.in;

    # ssl_certificate     /etc/letsencrypt/live/saferide.co.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/saferide.co.in/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    root /opt/saferide/web-admin/dist;
    index index.html;

    # SPA catch-all — send all routes to index.html (React Router handles them)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressively cache hashed assets (Vite fingerprints filenames)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── Web admin — dev static files (dev.saferide.co.in) ────────────────────────
server {
    listen 443 ssl;
    server_name dev.saferide.co.in;

    # ssl_certificate     /etc/letsencrypt/live/dev.saferide.co.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dev.saferide.co.in/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    root /opt/saferide/web-admin/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# ── API gateway — prod (api.saferide.co.in) ───────────────────────────────────
server {
    listen 443 ssl;
    server_name api.saferide.co.in;

    # ssl_certificate     /etc/letsencrypt/live/api.saferide.co.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.saferide.co.in/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;

    location ~* ^/(health|api/v1/auth|api/v1/status) { proxy_pass http://127.0.0.1:4001; }
    location ~* ^/api/v1/tenants                      { proxy_pass http://127.0.0.1:4002; }
    location ~* ^/api/v1/(buses|routes|stops|drivers|students) { proxy_pass http://127.0.0.1:4003; }
    location ~* ^/api/v1/(trips|telemetry|webhooks)   { proxy_pass http://127.0.0.1:4004; }
}

# ── API gateway — dev (api-dev.saferide.co.in) ────────────────────────────────
server {
    listen 443 ssl;
    server_name api-dev.saferide.co.in;

    # ssl_certificate     /etc/letsencrypt/live/api-dev.saferide.co.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api-dev.saferide.co.in/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;

    location ~* ^/(health|api/v1/auth|api/v1/status) { proxy_pass http://127.0.0.1:4001; }
    location ~* ^/api/v1/tenants                      { proxy_pass http://127.0.0.1:4002; }
    location ~* ^/api/v1/(buses|routes|stops|drivers|students) { proxy_pass http://127.0.0.1:4003; }
    location ~* ^/api/v1/(trips|telemetry|webhooks)   { proxy_pass http://127.0.0.1:4004; }
}

# ── WebSocket gateway — prod (ws.saferide.co.in) ─────────────────────────────
server {
    listen 443 ssl;
    server_name ws.saferide.co.in;

    # ssl_certificate     /etc/letsencrypt/live/ws.saferide.co.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ws.saferide.co.in/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        proxy_pass         http://127.0.0.1:4005;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}

# ── WebSocket gateway — dev (ws-dev.saferide.co.in) ──────────────────────────
server {
    listen 443 ssl;
    server_name ws-dev.saferide.co.in;

    # ssl_certificate     /etc/letsencrypt/live/ws-dev.saferide.co.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ws-dev.saferide.co.in/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:4005;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
