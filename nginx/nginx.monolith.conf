events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  # ── Health check for ALB ───────────────────────────────────────────────────
  server {
    listen 80;

    location /health {
      return 200 '{"success":true,"data":{"service":"saferide","status":"ok"}}';
      add_header Content-Type application/json;
    }

    # ── API routing to internal services ───────────────────────────────────
    location /api/v1/auth/ {
      proxy_pass http://127.0.0.1:4001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/tenants/ {
      proxy_pass http://127.0.0.1:4002;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/routes/ {
      proxy_pass http://127.0.0.1:4003;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/buses/ {
      proxy_pass http://127.0.0.1:4003;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/stops/ {
      proxy_pass http://127.0.0.1:4003;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/trips/ {
      proxy_pass http://127.0.0.1:4004;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket — livetrack gateway ──────────────────────────────────────
    location /ws/ {
      proxy_pass http://127.0.0.1:4005;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400;
    }

    # ── Web admin SPA ──────────────────────────────────────────────────────
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;

      # Cache hashed assets forever
      location ~* "\.[0-9a-f]{8}\.(js|css|woff2?)$" {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }
  }
}
