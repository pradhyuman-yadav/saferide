name: EAS Build (Production)

# Triggers on every push to main AND allows manual dispatch.
# Only runs when mobile app files change (avoids burning EAS build minutes on backend-only pushes).
on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/eas-build.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build (all | android | ios)'
        required: false
        default: 'all'

concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: true   # cancel a queued build if a new push arrives

jobs:
  build:
    name: EAS Production Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --passWithNoTests

      - name: EAS Build — Android
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' || github.event_name == 'push' }}
        run: eas build --non-interactive --platform android --profile production
        env:
          EXPO_PUBLIC_SENTRY_DSN:              ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_FIREBASE_API_KEY:        ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN:    ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID:     ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID:         ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY:     ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}

      - name: EAS Build — iOS
        if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios' || github.event_name == 'push' }}
        run: eas build --non-interactive --platform ios --profile production
        env:
          EXPO_PUBLIC_SENTRY_DSN:              ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
          EXPO_PUBLIC_FIREBASE_API_KEY:        ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN:    ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID:     ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID:         ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY:     ${{ secrets.EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}

      # ── Notify on failure ────────────────────────────────────────────────────
      # Add a Slack / email notification step here when monitoring is wired.
