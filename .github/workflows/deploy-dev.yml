name: Deploy Dev

# Triggers on every push to main (after PR merges).
# Builds Docker images, pushes to ECR, updates ECS dev cluster.

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECS_CLUSTER: saferide-dev

jobs:
  deploy:
    name: Build → ECR → ECS Dev
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── AWS auth ───────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build + push backend images ────────────────────────────────────────
      # Each service has its own ECR repo: saferide-{service}.
      # We tag with the commit SHA (immutable) and dev-latest (floating pointer).
      - name: Build and push backend images
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG:      ${{ github.sha }}
        run: |
          set -euo pipefail
          services=(auth-service tenant-service route-service trip-service livetrack-gateway)
          for svc in "${services[@]}"; do
            echo "▶ Building $svc"
            docker build \
              -f "$svc/Dockerfile" \
              -t "$REGISTRY/saferide-$svc:$TAG" \
              -t "$REGISTRY/saferide-$svc:dev-latest" \
              .
            docker push "$REGISTRY/saferide-$svc:$TAG"
            docker push "$REGISTRY/saferide-$svc:dev-latest"
            echo "✓ $svc pushed"
          done

      # ── Build + push web-admin image ───────────────────────────────────────
      # VITE_ vars are baked into the static bundle at build time via --build-arg.
      - name: Build and push web-admin image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG:      ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build \
            -f web-admin/Dockerfile \
            --build-arg VITE_AUTH_SERVICE_URL="${{ secrets.DEV_VITE_AUTH_SERVICE_URL }}" \
            --build-arg VITE_FIREBASE_API_KEY="${{ secrets.DEV_VITE_FIREBASE_API_KEY }}" \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN="${{ secrets.DEV_VITE_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg VITE_FIREBASE_PROJECT_ID="${{ secrets.DEV_VITE_FIREBASE_PROJECT_ID }}" \
            --build-arg VITE_FIREBASE_STORAGE_BUCKET="${{ secrets.DEV_VITE_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.DEV_VITE_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg VITE_FIREBASE_APP_ID="${{ secrets.DEV_VITE_FIREBASE_APP_ID }}" \
            -t "$REGISTRY/saferide-web-admin:$TAG" \
            -t "$REGISTRY/saferide-web-admin:dev-latest" \
            .
          docker push "$REGISTRY/saferide-web-admin:$TAG"
          docker push "$REGISTRY/saferide-web-admin:dev-latest"

      # ── Update ECS services ────────────────────────────────────────────────
      # For each service:
      #   1. Fetch current task definition (strip read-only fields)
      #   2. Swap in the new image tag
      #   3. Register a new task definition revision
      #   4. Update the ECS service to use the new revision
      - name: Update ECS dev services
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG:      ${{ github.sha }}
        run: |
          set -euo pipefail
          services=(auth-service tenant-service route-service trip-service livetrack-gateway web-admin)
          for svc in "${services[@]}"; do
            echo "▶ Updating ECS service saferide-$svc in $ECS_CLUSTER"

            TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition "saferide-$svc" \
              --query 'taskDefinition' \
              --output json | jq 'del(
                .taskDefinitionArn, .revision, .status,
                .requiresAttributes, .compatibilities,
                .registeredAt, .registeredBy
              )')

            NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
              --arg img "$REGISTRY/saferide-$svc:$TAG" \
              '.containerDefinitions[0].image = $img')

            NEW_ARN=$(aws ecs register-task-definition \
              --cli-input-json "$NEW_TASK_DEF" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)

            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "saferide-$svc" \
              --task-definition "$NEW_ARN" \
              --no-cli-pager

            echo "✓ saferide-$svc → $NEW_ARN"
          done

      # ── Deploy Firestore rules to dev Firebase project ─────────────────────
      - name: Deploy Firestore rules (dev)
        run: |
          npx firebase-tools@latest use default
          npx firebase-tools@latest deploy --only firestore:rules,firestore:indexes,database
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
