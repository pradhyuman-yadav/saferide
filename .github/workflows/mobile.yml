name: Mobile Build & Submit

# Triggered automatically after Deploy Prod succeeds.
# Builds both Android (.aab) and iOS (.ipa) via EAS Cloud, then submits:
#   Android → Play Console internal track
#   iOS → App Store Connect / TestFlight

on:
  workflow_run:
    workflows: ["Deploy Prod"]
    types: [completed]

jobs:
  eas:
    name: EAS Build + Submit
    runs-on: ubuntu-latest

    # Only run when the prod deploy actually succeeded (not on failure/cancel)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Checkout the release branch (the one that just deployed)
          ref: release

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install EAS CLI
        run: npm install -g eas-cli

      # ── Inject prod Firebase config files ────────────────────────────────────
      - name: Write google-services.json (Android)
        run: echo '${{ secrets.PROD_GOOGLE_SERVICES_JSON }}' > mobile/google-services.json

      - name: Write GoogleService-Info.plist (iOS)
        run: |
          mkdir -p mobile/ios
          echo '${{ secrets.PROD_GOOGLE_SERVICE_INFO_PLIST }}' > mobile/ios/GoogleService-Info.plist

      # ── iOS App Store Connect API key ────────────────────────────────────────
      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo '${{ secrets.APPLE_APP_STORE_CONNECT_API_KEY }}' \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_APP_STORE_CONNECT_KEY_ID }}.p8

      # ── EAS Build — both platforms ────────────────────────────────────────────
      - name: EAS Build (Android + iOS)
        working-directory: mobile
        run: >
          eas build
          --platform all
          --profile production
          --non-interactive
          --wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Prod API URLs baked into the app bundle
          EXPO_PUBLIC_AUTH_SERVICE_URL:             ${{ secrets.PROD_EXPO_PUBLIC_AUTH_SERVICE_URL }}
          EXPO_PUBLIC_ROUTE_SERVICE_URL:            ${{ secrets.PROD_EXPO_PUBLIC_ROUTE_SERVICE_URL }}
          EXPO_PUBLIC_TRIP_SERVICE_URL:             ${{ secrets.PROD_EXPO_PUBLIC_TRIP_SERVICE_URL }}
          EXPO_PUBLIC_WS_URL:                       ${{ secrets.PROD_EXPO_PUBLIC_WS_URL }}
          EXPO_PUBLIC_GOOGLE_MAPS_API_KEY:          ${{ secrets.PROD_EXPO_PUBLIC_GOOGLE_MAPS_API_KEY }}
          EXPO_PUBLIC_FIREBASE_API_KEY:             ${{ secrets.PROD_EXPO_PUBLIC_FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN:         ${{ secrets.PROD_EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID:          ${{ secrets.PROD_EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_DATABASE_URL:        ${{ secrets.PROD_EXPO_PUBLIC_FIREBASE_DATABASE_URL }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET:      ${{ secrets.PROD_EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.PROD_EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID:              ${{ secrets.PROD_EXPO_PUBLIC_FIREBASE_APP_ID }}

      # ── EAS Submit ────────────────────────────────────────────────────────────
      - name: Submit to Play Console (Android internal track)
        working-directory: mobile
        run: eas submit --platform android --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to App Store Connect / TestFlight (iOS)
        working-directory: mobile
        run: >
          eas submit
          --platform ios
          --latest
          --non-interactive
          --asc-app-id ${{ secrets.APPLE_ASC_APP_ID }}
        env:
          EXPO_TOKEN:                              ${{ secrets.EXPO_TOKEN }}
          APPLE_APP_STORE_CONNECT_KEY_ID:          ${{ secrets.APPLE_APP_STORE_CONNECT_KEY_ID }}
          APPLE_APP_STORE_CONNECT_ISSUER_ID:       ${{ secrets.APPLE_APP_STORE_CONNECT_ISSUER_ID }}
