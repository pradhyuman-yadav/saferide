name: Deploy web-admin

# Web-admin is handled inline (not via the reusable _deploy-service.yml) because
# VITE_ vars are different for dev vs prod and must be baked into the image at
# build time as --build-arg. Reusable workflows can't conditionally select
# between DEV_* and PROD_* secrets based on branch.

on:
  push:
    branches: [main, release]
    paths:
      - "web-admin/**"
      - "packages/**"
      - ".github/workflows/deploy-web-admin.yml"

env:
  AWS_REGION: ap-south-2

# ── Dev deploy ─────────────────────────────────────────────────────────────────
jobs:
  deploy-dev:
    name: "web-admin → saferide-dev"
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-2

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push (dev)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG:      ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build \
            -f web-admin/Dockerfile \
            --build-arg VITE_AUTH_SERVICE_URL="${{ secrets.DEV_VITE_AUTH_SERVICE_URL }}" \
            --build-arg VITE_FIREBASE_API_KEY="${{ secrets.DEV_VITE_FIREBASE_API_KEY }}" \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN="${{ secrets.DEV_VITE_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg VITE_FIREBASE_PROJECT_ID="${{ secrets.DEV_VITE_FIREBASE_PROJECT_ID }}" \
            --build-arg VITE_FIREBASE_STORAGE_BUCKET="${{ secrets.DEV_VITE_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.DEV_VITE_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg VITE_FIREBASE_APP_ID="${{ secrets.DEV_VITE_FIREBASE_APP_ID }}" \
            -t "$REGISTRY/saferide-web-admin:$TAG" \
            -t "$REGISTRY/saferide-web-admin:dev-latest" \
            .
          docker push "$REGISTRY/saferide-web-admin:$TAG"
          docker push "$REGISTRY/saferide-web-admin:dev-latest"

      - name: Update ECS service (dev)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG:      ${{ github.sha }}
        run: |
          set -euo pipefail
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "saferide-web-admin" \
            --query 'taskDefinition' \
            --output json | jq 'del(
              .taskDefinitionArn, .revision, .status,
              .requiresAttributes, .compatibilities,
              .registeredAt, .registeredBy
            )')

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg img "$REGISTRY/saferide-web-admin:$TAG" \
            '.containerDefinitions[0].image = $img')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster saferide-dev \
            --service saferide-web-admin \
            --task-definition "$NEW_ARN" \
            --no-cli-pager

          echo "✓ saferide-web-admin → $NEW_ARN"

  # ── Prod deploy ───────────────────────────────────────────────────────────────
  deploy-prod:
    name: "web-admin → saferide-prod"
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    environment: production   # manual approval gate

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-2

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push (prod)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG:      ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build \
            -f web-admin/Dockerfile \
            --build-arg VITE_AUTH_SERVICE_URL="${{ secrets.PROD_VITE_AUTH_SERVICE_URL }}" \
            --build-arg VITE_FIREBASE_API_KEY="${{ secrets.PROD_VITE_FIREBASE_API_KEY }}" \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN="${{ secrets.PROD_VITE_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg VITE_FIREBASE_PROJECT_ID="${{ secrets.PROD_VITE_FIREBASE_PROJECT_ID }}" \
            --build-arg VITE_FIREBASE_STORAGE_BUCKET="${{ secrets.PROD_VITE_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.PROD_VITE_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg VITE_FIREBASE_APP_ID="${{ secrets.PROD_VITE_FIREBASE_APP_ID }}" \
            -t "$REGISTRY/saferide-web-admin:$TAG" \
            -t "$REGISTRY/saferide-web-admin:prod-latest" \
            .
          docker push "$REGISTRY/saferide-web-admin:$TAG"
          docker push "$REGISTRY/saferide-web-admin:prod-latest"

      - name: Update ECS service (prod)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG:      ${{ github.sha }}
        run: |
          set -euo pipefail
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "saferide-web-admin" \
            --query 'taskDefinition' \
            --output json | jq 'del(
              .taskDefinitionArn, .revision, .status,
              .requiresAttributes, .compatibilities,
              .registeredAt, .registeredBy
            )')

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg img "$REGISTRY/saferide-web-admin:$TAG" \
            '.containerDefinitions[0].image = $img')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster saferide-prod \
            --service saferide-web-admin \
            --task-definition "$NEW_ARN" \
            --no-cli-pager

      - name: Wait for service stability
        run: |
          set -euo pipefail
          echo "⏳ Waiting for saferide-web-admin to reach steady state..."
          aws ecs wait services-stable \
            --cluster saferide-prod \
            --services saferide-web-admin
          echo "✓ saferide-web-admin stable"
