# Reusable workflow — called by each backend service's deploy-{service}.yml.
# Handles: ECR login → docker build → push → ECS task-def rotation → optional wait.
#
# Usage:
#   jobs:
#     deploy-dev:
#       uses: ./.github/workflows/_deploy-service.yml
#       with:
#         service-name: auth-service
#         ecs-cluster:  saferide-dev
#       secrets: inherit

on:
  workflow_call:
    inputs:
      service-name:
        description: "Matches the directory name and ECR repo suffix (e.g. auth-service)"
        required: true
        type: string
      ecs-cluster:
        description: "ECS cluster name (e.g. saferide-dev or saferide-prod)"
        required: true
        type: string
      deploy-environment:
        description: "GitHub Environment name for approval gate. Leave empty for dev."
        required: false
        type: string
        default: ""
      wait-for-stable:
        description: "Block until ECS service reaches steady state (use for prod)"
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      FIREBASE_TOKEN:
        required: false

jobs:
  deploy:
    name: "${{ inputs.service-name }} → ${{ inputs.ecs-cluster }}"
    runs-on: ubuntu-latest
    # Sets the manual approval gate for prod (empty string = no gate for dev)
    environment: ${{ inputs.deploy-environment }}

    steps:
      - uses: actions/checkout@v4

      # ── AWS ───────────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-2

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build + push ───────────────────────────────────────────────────────
      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          SERVICE:  ${{ inputs.service-name }}
          TAG:      ${{ github.sha }}
          CLUSTER:  ${{ inputs.ecs-cluster }}
        run: |
          set -euo pipefail

          # Derive a floating "latest" tag for this environment (dev-latest / prod-latest)
          ENV_TAG="${CLUSTER#saferide-}-latest"   # strips "saferide-" prefix

          echo "▶ Building saferide-$SERVICE:$TAG"
          docker build \
            -f "$SERVICE/Dockerfile" \
            -t "$REGISTRY/saferide-$SERVICE:$TAG" \
            -t "$REGISTRY/saferide-$SERVICE:$ENV_TAG" \
            .

          docker push "$REGISTRY/saferide-$SERVICE:$TAG"
          docker push "$REGISTRY/saferide-$SERVICE:$ENV_TAG"
          echo "✓ Pushed $REGISTRY/saferide-$SERVICE:$TAG"

      # ── ECS task-def rotation ──────────────────────────────────────────────
      # 1. Fetch the current task definition, strip AWS-managed read-only fields.
      # 2. Replace the container image with the new SHA tag.
      # 3. Register a new revision.
      # 4. Update the ECS service to use it (rolling deploy).
      - name: Update ECS service
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          SERVICE:  ${{ inputs.service-name }}
          TAG:      ${{ github.sha }}
          CLUSTER:  ${{ inputs.ecs-cluster }}
        run: |
          set -euo pipefail

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "saferide-$SERVICE" \
            --query 'taskDefinition' \
            --output json | jq 'del(
              .taskDefinitionArn, .revision, .status,
              .requiresAttributes, .compatibilities,
              .registeredAt, .registeredBy
            )')

          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg img "$REGISTRY/saferide-$SERVICE:$TAG" \
            '.containerDefinitions[0].image = $img')

          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster "$CLUSTER" \
            --service "saferide-$SERVICE" \
            --task-definition "$NEW_ARN" \
            --no-cli-pager

          echo "✓ saferide-$SERVICE → $NEW_ARN"

      # ── Wait for steady state (prod only) ─────────────────────────────────
      # Blocks until the rolling deploy completes. If the new task fails its
      # health check, this step times out and the workflow fails — catching
      # bad images before the next service is updated.
      - name: Wait for service stability
        if: ${{ inputs.wait-for-stable }}
        env:
          SERVICE: ${{ inputs.service-name }}
          CLUSTER: ${{ inputs.ecs-cluster }}
        run: |
          set -euo pipefail
          echo "⏳ Waiting for saferide-$SERVICE to reach steady state..."
          aws ecs wait services-stable \
            --cluster "$CLUSTER" \
            --services "saferide-$SERVICE"
          echo "✓ saferide-$SERVICE stable"
