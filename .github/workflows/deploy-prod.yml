name: Deploy Prod

# Triggers on push to release branch.
# Runs full quality gate first, then deploys with a manual approval gate.

on:
  push:
    branches: [release]

jobs:
  # ── Quality gate (re-run full suite — never skip for prod) ─────────────────
  quality:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: >-
            {"type":"service_account","project_id":"test","private_key_id":"key",
            "private_key":"-----BEGIN RSA PRIVATE KEY-----\nMIIEpAIBAAKCAQEA0Z3VS5JJ\n-----END RSA PRIVATE KEY-----\n",
            "client_email":"test@test.iam.gserviceaccount.com","client_id":"1",
            "auth_uri":"https://accounts.google.com/o/oauth2/auth",
            "token_uri":"https://oauth2.googleapis.com/token",
            "auth_provider_x509_cert_url":"https://www.googleapis.com/oauth2/v1/certs",
            "client_x509_cert_url":"https://www.googleapis.com/robot/v1/metadata/x509/test"}
          FIREBASE_DATABASE_URL: https://test-default-rtdb.firebaseio.com
          JWT_PUBLIC_KEY: "-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA0Z3VS5JJcds3xHn/ygWe\n-----END PUBLIC KEY-----"
          JWT_PRIVATE_KEY: "-----BEGIN RSA PRIVATE KEY-----\nMIIEpAIBAAKCAQEA0Z3VS5JJ\n-----END RSA PRIVATE KEY-----"
          GOOGLE_MAPS_API_KEY: test_key

  # ── Production deploy (requires manual approval in GitHub Environments) ─────
  deploy:
    name: Deploy to prod
    needs: quality
    runs-on: ubuntu-latest

    # "production" environment must be configured in GitHub repo settings
    # with required reviewers — anyone in that list must approve before this runs
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Backend: SSH → EC2 prod ────────────────────────────────────────────
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy backend to prod EC2
        env:
          EC2_HOST:  ${{ secrets.EC2_PROD_HOST }}
          PROD_ENV:  ${{ secrets.PROD_ENV_FILE }}
        run: |
          ssh ubuntu@$EC2_HOST << 'ENDSSH'
            set -e
            cd /opt/saferide
            echo "$PROD_ENV" > .env
            git pull origin release
            docker compose up --build -d
            docker image prune -f
          ENDSSH

      # ── Web admin: Firebase Hosting (prod project) ─────────────────────────
      - name: Build web-admin
        run: pnpm --filter web-admin build
        env:
          VITE_AUTH_SERVICE_URL:              ${{ secrets.PROD_VITE_AUTH_SERVICE_URL }}
          VITE_FIREBASE_API_KEY:              ${{ secrets.PROD_VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:          ${{ secrets.PROD_VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:           ${{ secrets.PROD_VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:       ${{ secrets.PROD_VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID:  ${{ secrets.PROD_VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:               ${{ secrets.PROD_VITE_FIREBASE_APP_ID }}

      - name: Deploy web-admin to Firebase Hosting (prod)
        run: |
          npx firebase-tools@latest use prod
          npx firebase-tools@latest deploy --only hosting,firestore:rules,firestore:indexes,database
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
