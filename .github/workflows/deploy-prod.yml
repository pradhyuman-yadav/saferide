name: Deploy Prod

# Triggers on push to release branch.
# Full quality gate → manual approval gate → ECR push → ECS prod update.

on:
  push:
    branches: [release]

env:
  AWS_REGION: ap-south-1
  ECS_CLUSTER: saferide-prod

jobs:
  # ── Quality gate ───────────────────────────────────────────────────────────
  quality:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: >-
            {"type":"service_account","project_id":"test","private_key_id":"key",
            "private_key":"-----BEGIN RSA PRIVATE KEY-----\nMIIEpAIBAAKCAQEA0Z3VS5JJ\n-----END RSA PRIVATE KEY-----\n",
            "client_email":"test@test.iam.gserviceaccount.com","client_id":"1",
            "auth_uri":"https://accounts.google.com/o/oauth2/auth",
            "token_uri":"https://oauth2.googleapis.com/token",
            "auth_provider_x509_cert_url":"https://www.googleapis.com/oauth2/v1/certs",
            "client_x509_cert_url":"https://www.googleapis.com/robot/v1/metadata/x509/test"}
          FIREBASE_DATABASE_URL: https://test-default-rtdb.firebaseio.com
          JWT_PUBLIC_KEY: "-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA0Z3VS5JJcds3xHn/ygWe\n-----END PUBLIC KEY-----"
          JWT_PRIVATE_KEY: "-----BEGIN RSA PRIVATE KEY-----\nMIIEpAIBAAKCAQEA0Z3VS5JJ\n-----END RSA PRIVATE KEY-----"
          GOOGLE_MAPS_API_KEY: test_key

  # ── Production deploy (requires manual approval in GitHub Environments) ────
  deploy:
    name: Build → ECR → ECS Prod
    needs: quality
    runs-on: ubuntu-latest
    environment: production   # pause here — reviewer approves in GitHub UI

    steps:
      - uses: actions/checkout@v4

      # ── AWS auth ───────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ap-south-1

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build + push backend images ────────────────────────────────────────
      - name: Build and push backend images
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG:      ${{ github.sha }}
        run: |
          set -euo pipefail
          services=(auth-service tenant-service route-service trip-service livetrack-gateway)
          for svc in "${services[@]}"; do
            echo "▶ Building $svc"
            docker build \
              -f "$svc/Dockerfile" \
              -t "$REGISTRY/saferide-$svc:$TAG" \
              -t "$REGISTRY/saferide-$svc:prod-latest" \
              .
            docker push "$REGISTRY/saferide-$svc:$TAG"
            docker push "$REGISTRY/saferide-$svc:prod-latest"
            echo "✓ $svc pushed"
          done

      # ── Build + push web-admin image ───────────────────────────────────────
      - name: Build and push web-admin image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG:      ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build \
            -f web-admin/Dockerfile \
            --build-arg VITE_AUTH_SERVICE_URL="${{ secrets.PROD_VITE_AUTH_SERVICE_URL }}" \
            --build-arg VITE_FIREBASE_API_KEY="${{ secrets.PROD_VITE_FIREBASE_API_KEY }}" \
            --build-arg VITE_FIREBASE_AUTH_DOMAIN="${{ secrets.PROD_VITE_FIREBASE_AUTH_DOMAIN }}" \
            --build-arg VITE_FIREBASE_PROJECT_ID="${{ secrets.PROD_VITE_FIREBASE_PROJECT_ID }}" \
            --build-arg VITE_FIREBASE_STORAGE_BUCKET="${{ secrets.PROD_VITE_FIREBASE_STORAGE_BUCKET }}" \
            --build-arg VITE_FIREBASE_MESSAGING_SENDER_ID="${{ secrets.PROD_VITE_FIREBASE_MESSAGING_SENDER_ID }}" \
            --build-arg VITE_FIREBASE_APP_ID="${{ secrets.PROD_VITE_FIREBASE_APP_ID }}" \
            -t "$REGISTRY/saferide-web-admin:$TAG" \
            -t "$REGISTRY/saferide-web-admin:prod-latest" \
            .
          docker push "$REGISTRY/saferide-web-admin:$TAG"
          docker push "$REGISTRY/saferide-web-admin:prod-latest"

      # ── Update ECS prod services ───────────────────────────────────────────
      # Waits for each service to reach steady state before proceeding.
      # This catches bad images before the next service is updated.
      - name: Update ECS prod services
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG:      ${{ github.sha }}
        run: |
          set -euo pipefail
          services=(auth-service tenant-service route-service trip-service livetrack-gateway web-admin)
          for svc in "${services[@]}"; do
            echo "▶ Updating ECS service saferide-$svc in $ECS_CLUSTER"

            TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition "saferide-$svc" \
              --query 'taskDefinition' \
              --output json | jq 'del(
                .taskDefinitionArn, .revision, .status,
                .requiresAttributes, .compatibilities,
                .registeredAt, .registeredBy
              )')

            NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
              --arg img "$REGISTRY/saferide-$svc:$TAG" \
              '.containerDefinitions[0].image = $img')

            NEW_ARN=$(aws ecs register-task-definition \
              --cli-input-json "$NEW_TASK_DEF" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)

            aws ecs update-service \
              --cluster "$ECS_CLUSTER" \
              --service "saferide-$svc" \
              --task-definition "$NEW_ARN" \
              --no-cli-pager

            echo "⏳ Waiting for steady state: saferide-$svc"
            aws ecs wait services-stable \
              --cluster "$ECS_CLUSTER" \
              --services "saferide-$svc"

            echo "✓ saferide-$svc stable → $NEW_ARN"
          done

      # ── Deploy Firestore rules to prod Firebase project ───────────────────
      - name: Deploy Firestore rules (prod)
        run: |
          npx firebase-tools@latest use prod
          npx firebase-tools@latest deploy --only firestore:rules,firestore:indexes,database
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  # ── Trigger mobile build after successful prod deploy ──────────────────────
  mobile:
    name: EAS Build + Submit
    needs: deploy
    uses: ./.github/workflows/mobile.yml
    secrets: inherit
